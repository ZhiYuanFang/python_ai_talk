# 本地开发 overlay：与基线 docker-compose.yml 组合使用
# 项目名 python-ai-talk-local（与测试/生产隔离）
# 本文件只改「本地开发特有的部署项」：镜像标签、container_name、端口映射、extra_hosts、网络
# 不写 environment：业务环境变量全部由基线 + --env-file .env.local 注入
#
# 启动命令：
#   docker compose --env-file env/.env.local \
#     -f docker-compose.yml \
#     -f docker-compose.local.yml \
#     up -d --build

name: python-ai-talk-local

services:
  python-ai-talk:
    image: go-ai-talk/python-ai-talk:local
    container_name: go-ai-talk-python-ai-talk
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      external: true
      name: go-ai-talk-net
